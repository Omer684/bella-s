<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bella's Restaurant – Haripur</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c9a84c;
    --dark: #0f0c07;
    --panel: #1c1608;
    --panel2: #140f05;
    --cream: #f5f0e8;
    --red: #b8303a;
    --green: #3fae5a;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--dark);
    color: var(--cream);
    font-family: 'Poppins', sans-serif;
    overflow-x: hidden;
  }

  /* ── HERO ── */
  #hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
    overflow: hidden;
    background: radial-gradient(ellipse at center, #1a1208 0%, #0f0c07 70%);
  }

  .particle {
    position: absolute;
    border-radius: 50%;
    opacity: 0;
    animation: float-up linear infinite;
    pointer-events: none;
  }

  @keyframes float-up {
    0%   { transform: translateY(110vh) scale(0); opacity: 0; }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.4; }
    100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
  }

  .hero-badge {
    display: inline-block;
    background: var(--gold);
    color: var(--dark);
    font-size: .75rem;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 6px 20px;
    border-radius: 40px;
    margin-bottom: 22px;
    animation: fade-down .8s ease both;
  }

  .hero-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(4rem, 14vw, 10rem);
    line-height: 1;
    letter-spacing: -2px;
    background: linear-gradient(135deg, #fff 30%, var(--gold) 70%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: fade-down .9s .15s ease both;
  }

  .hero-sub {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(1rem, 3vw, 1.5rem);
    color: var(--gold);
    margin: 16px 0 36px;
    animation: fade-down .9s .3s ease both;
  }

  .stars { font-size: 1.5rem; color: var(--gold); margin-bottom: 8px; animation: fade-down .9s .4s ease both; letter-spacing: 4px; }
  .rating-line { font-size: .85rem; color: rgba(255,255,255,.55); margin-bottom: 44px; animation: fade-down .9s .5s ease both; }

  .cta-row { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; animation: fade-down .9s .6s ease both; }

  .btn {
    padding: 14px 34px;
    border-radius: 50px;
    font-size: .9rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform .2s, box-shadow .2s;
    text-decoration: none;
    display: inline-block;
    border: none;
    font-family: 'Poppins', sans-serif;
  }

  .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,.4); }
  .btn-primary { background: var(--gold); color: var(--dark); }
  .btn-outline { border: 2px solid var(--gold); color: var(--gold); background: transparent; }

  @keyframes fade-down { from { opacity: 0; transform: translateY(-24px); } to { opacity: 1; transform: translateY(0); } }

  .scroll-hint {
    position: absolute; bottom: 36px;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    font-size: .7rem; letter-spacing: 2px; text-transform: uppercase;
    color: rgba(255,255,255,.4);
    animation: fade-down 1s .9s ease both;
  }
  .scroll-line { width: 1px; height: 50px; background: linear-gradient(to bottom, var(--gold), transparent); animation: pulse-line 2s infinite; }
  @keyframes pulse-line { 0%, 100% { opacity: .4; transform: scaleY(1); } 50% { opacity: 1; transform: scaleY(1.2); } }

  /* ── SECTION BASE ── */
  section { padding: 100px 24px; max-width: 1100px; margin: 0 auto; }
  .section-label { font-size: .72rem; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
  .section-title { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 6vw, 3.5rem); line-height: 1.15; margin-bottom: 20px; }
  .divider { width: 100%; height: 1px; background: linear-gradient(to right, transparent, var(--gold), transparent); opacity: .3; margin: 0 auto; }

  /* ── HIGHLIGHTS ── */
  #highlights { text-align: center; }
  .highlights-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 28px; margin-top: 56px; }
  .highlight-card {
    background: linear-gradient(145deg, var(--panel), var(--panel2));
    border: 1px solid rgba(201,168,76,.15);
    border-radius: 20px;
    padding: 40px 28px;
    transition: transform .3s, border-color .3s, box-shadow .3s;
    opacity: 0; transform: translateY(30px);
  }
  .highlight-card.visible { animation: card-in .6s ease forwards; }
  @keyframes card-in { to { opacity: 1; transform: translateY(0); } }
  .highlight-card:hover { transform: translateY(-8px); border-color: rgba(201,168,76,.5); box-shadow: 0 20px 50px rgba(0,0,0,.5); }
  .card-icon { font-size: 2.8rem; margin-bottom: 18px; }
  .card-title { font-family: 'Playfair Display', serif; font-size: 1.25rem; margin-bottom: 10px; }
  .card-text { font-size: .85rem; color: rgba(255,255,255,.55); line-height: 1.7; }

  /* ── MENU / ORDERING ── */
  #menu { text-align: center; }

  .menu-tabs {
    display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
    margin: 40px 0; position: sticky; top: 70px; z-index: 50;
    background: rgba(15,12,7,.85); backdrop-filter: blur(10px);
    padding: 12px; border-radius: 50px;
  }

  .tab-btn {
    padding: 10px 26px; border-radius: 50px;
    border: 1.5px solid rgba(201,168,76,.3);
    background: transparent; color: rgba(255,255,255,.6);
    font-size: .85rem; font-family: 'Poppins', sans-serif;
    cursor: pointer; transition: all .25s; white-space: nowrap;
  }
  .tab-btn.active, .tab-btn:hover { background: var(--gold); border-color: var(--gold); color: var(--dark); font-weight: 600; }

  .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 24px; }

  .menu-item {
    background: linear-gradient(145deg, var(--panel), var(--panel2));
    border: 1px solid rgba(201,168,76,.1);
    border-radius: 16px;
    overflow: hidden;
    text-align: left;
    transition: border-color .25s, transform .25s, box-shadow .25s;
    display: none;
    position: relative;
  }
  .menu-item.show { display: flex; flex-direction: column; animation: fade-in .4s ease both; }
  @keyframes fade-in { from { opacity: 0; transform: scale(.97); } to { opacity: 1; transform: scale(1); } }
  .menu-item:hover { border-color: rgba(201,168,76,.4); transform: translateY(-6px); box-shadow: 0 20px 40px rgba(0,0,0,.5); }

  .item-photo-wrap { width: 100%; height: 190px; overflow: hidden; position: relative; background: #100c06; }
  .item-photo-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .5s ease; }
  .menu-item:hover .item-photo-wrap img { transform: scale(1.08); }

  .item-body { padding: 22px 24px 24px; display: flex; flex-direction: column; flex-grow: 1; }
  .item-name { font-family: 'Playfair Display', serif; font-size: 1.1rem; margin-bottom: 6px; }
  .item-desc { font-size: .8rem; color: rgba(255,255,255,.5); line-height: 1.6; margin-bottom: 16px; flex-grow: 1; }

  .item-footer { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .item-price { color: var(--gold); font-weight: 600; font-size: .95rem; }
  .item-size-note { color: rgba(255,255,255,.4); font-weight: 400; font-size: .78rem; }

  .add-btn {
    background: var(--gold); color: var(--dark);
    border: none; border-radius: 50px;
    padding: 9px 18px; font-size: .78rem; font-weight: 700;
    letter-spacing: .5px; text-transform: uppercase;
    cursor: pointer; transition: transform .2s, background .2s;
    display: flex; align-items: center; gap: 6px;
  }
  .add-btn:hover { transform: translateY(-2px); }
  .add-btn.added { background: var(--green); color: #fff; }

  .qty-stepper {
    display: flex; align-items: center; gap: 10px;
    background: rgba(201,168,76,.12); border-radius: 50px; padding: 4px 6px;
  }
  .qty-stepper button {
    width: 26px; height: 26px; border-radius: 50%; border: none;
    background: var(--gold); color: var(--dark); font-weight: 700;
    font-size: .9rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: transform .15s;
  }
  .qty-stepper button:hover { transform: scale(1.1); }
  .qty-stepper span { min-width: 18px; text-align: center; font-weight: 600; font-size: .85rem; }

  /* ── FLOATING CART BUTTON ── */
  #cartFab {
    position: fixed; bottom: 28px; right: 28px; z-index: 900;
    background: var(--gold); color: var(--dark);
    border-radius: 50px; padding: 16px 24px;
    display: flex; align-items: center; gap: 12px;
    box-shadow: 0 12px 35px rgba(0,0,0,.5);
    cursor: pointer; border: none; font-family: 'Poppins', sans-serif;
    transition: transform .25s; transform: translateY(120px); opacity: 0;
  }
  #cartFab.show { transform: translateY(0); opacity: 1; }
  #cartFab:hover { transform: translateY(-3px); }
  #cartFab .fab-icon { font-size: 1.3rem; position: relative; }
  #cartFab .fab-count {
    position: absolute; top: -10px; right: -12px;
    background: var(--red); color: #fff; font-size: .65rem; font-weight: 700;
    border-radius: 50%; width: 19px; height: 19px;
    display: flex; align-items: center; justify-content: center;
  }
  #cartFab .fab-text { font-size: .85rem; font-weight: 700; }
  #cartFab .fab-total { font-size: .85rem; font-weight: 700; border-left: 1.5px solid rgba(15,12,7,.25); padding-left: 12px; }

  /* ── CART DRAWER ── */
  #cartOverlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.6);
    z-index: 998; opacity: 0; pointer-events: none; transition: opacity .3s;
    backdrop-filter: blur(2px);
  }
  #cartOverlay.show { opacity: 1; pointer-events: auto; }

  #cartDrawer {
    position: fixed; top: 0; right: 0; height: 100vh; width: min(420px, 100vw);
    background: #15110a; z-index: 999;
    box-shadow: -20px 0 60px rgba(0,0,0,.6);
    transform: translateX(100%); transition: transform .4s cubic-bezier(.4,0,.2,1);
    display: flex; flex-direction: column;
  }
  #cartDrawer.show { transform: translateX(0); }

  .cart-header {
    padding: 26px 26px 20px; border-bottom: 1px solid rgba(255,255,255,.08);
    display: flex; align-items: center; justify-content: space-between;
  }
  .cart-header h3 { font-family: 'Playfair Display', serif; font-size: 1.4rem; }
  .cart-close { background: none; border: none; color: rgba(255,255,255,.6); font-size: 1.4rem; cursor: pointer; line-height: 1; }
  .cart-close:hover { color: var(--gold); }

  .cart-body { flex-grow: 1; overflow-y: auto; padding: 16px 26px; }
  .cart-empty { text-align: center; padding: 80px 20px; color: rgba(255,255,255,.4); }
  .cart-empty .big { font-size: 3rem; margin-bottom: 16px; }

  .cart-line {
    display: flex; gap: 14px; align-items: center;
    padding: 16px 0; border-bottom: 1px solid rgba(255,255,255,.06);
  }
  .cart-line img { width: 58px; height: 58px; border-radius: 10px; object-fit: cover; flex-shrink: 0; }
  .cart-line-info { flex-grow: 1; min-width: 0; }
  .cart-line-name { font-size: .88rem; font-weight: 600; margin-bottom: 4px; }
  .cart-line-price { font-size: .78rem; color: var(--gold); }
  .cart-line-remove { background: none; border: none; color: rgba(255,255,255,.35); cursor: pointer; font-size: .75rem; margin-top: 4px; text-decoration: underline; padding: 0; }

  .cart-footer { padding: 22px 26px 28px; border-top: 1px solid rgba(255,255,255,.08); }
  .cart-totals-row { display: flex; justify-content: space-between; font-size: .85rem; color: rgba(255,255,255,.6); margin-bottom: 8px; }
  .cart-totals-row.grand { font-size: 1.1rem; font-weight: 700; color: var(--cream); margin: 14px 0 20px; }
  .cart-totals-row.grand span:last-child { color: var(--gold); }

  .checkout-btn {
    width: 100%; background: var(--gold); color: var(--dark);
    border: none; padding: 16px; border-radius: 50px;
    font-size: .95rem; font-weight: 700; cursor: pointer;
    transition: transform .2s; font-family: 'Poppins', sans-serif;
  }
  .checkout-btn:hover { transform: translateY(-2px); }
  .checkout-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

  .cart-note { font-size: .72rem; color: rgba(255,255,255,.35); text-align: center; margin-top: 12px; line-height: 1.5; }

  /* ── REVIEWS ── */
  #reviews { text-align: center; }
  .reviews-track { display: flex; gap: 24px; margin-top: 56px; overflow: hidden; }
  .review-slide {
    min-width: 320px; background: linear-gradient(145deg, var(--panel), var(--panel2));
    border: 1px solid rgba(201,168,76,.12); border-radius: 20px;
    padding: 32px 28px; text-align: left; flex-shrink: 0; transition: all .3s;
  }
  .rev-stars { color: var(--gold); margin-bottom: 14px; font-size: 1rem; }
  .rev-text { font-size: .88rem; line-height: 1.75; color: rgba(255,255,255,.7); margin-bottom: 20px; font-style: italic; }
  .rev-author { font-weight: 600; font-size: .85rem; color: var(--gold); }
  .rev-date { font-size: .75rem; color: rgba(255,255,255,.35); }
  .reviews-nav { display: flex; gap: 12px; justify-content: center; margin-top: 36px; }
  .nav-dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,.2); cursor: pointer; transition: background .25s, transform .25s; }
  .nav-dot.active { background: var(--gold); transform: scale(1.3); }

  /* ── INFO ── */
  #info { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: start; }
  @media (max-width: 700px) { #info { grid-template-columns: 1fr; } }
  .info-row { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 28px; padding-bottom: 28px; border-bottom: 1px solid rgba(255,255,255,.07); }
  .info-row:last-child { border-bottom: none; }
  .info-icon { font-size: 1.5rem; flex-shrink: 0; margin-top: 2px; }
  .info-label { font-size: .72rem; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 4px; }
  .info-value { font-size: .95rem; color: rgba(255,255,255,.8); line-height: 1.6; }

  .map-placeholder {
    width: 100%; height: 280px; border-radius: 20px;
    background: linear-gradient(135deg, var(--panel), #2a1f08);
    border: 1px solid rgba(201,168,76,.2);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
    color: rgba(255,255,255,.45); font-size: .85rem; text-decoration: none; transition: border-color .25s;
  }
  .map-placeholder:hover { border-color: var(--gold); }
  .map-placeholder span:first-child { font-size: 2.5rem; }

  footer { text-align: center; padding: 48px 24px 120px; border-top: 1px solid rgba(255,255,255,.06); font-size: .8rem; color: rgba(255,255,255,.3); }
  footer strong { color: var(--gold); font-family: 'Playfair Display', serif; font-size: 1.1rem; }

  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 997;
    padding: 18px 40px; display: flex; justify-content: space-between; align-items: center;
    background: rgba(15,12,7,0); transition: background .4s, padding .4s, top .3s;
  }
  nav.with-bar { top: 38px; }
  nav.scrolled { background: rgba(15,12,7,.95); backdrop-filter: blur(12px); padding: 12px 40px; box-shadow: 0 2px 20px rgba(0,0,0,.5); }
  .nav-logo { height: 34px; display: flex; align-items: center; }
  .nav-logo img { height: 100%; width: auto; display: block; }
  .nav-links { display: flex; gap: 32px; list-style: none; align-items: center; }
  .nav-links a { color: rgba(255,255,255,.65); text-decoration: none; font-size: .85rem; transition: color .2s; }
  .nav-links a:hover { color: var(--gold); }
  .nav-cart-btn {
    background: rgba(201,168,76,.15); border: 1px solid rgba(201,168,76,.4);
    color: var(--gold); border-radius: 50px; padding: 8px 16px;
    font-size: .8rem; cursor: pointer; display: flex; align-items: center; gap: 6px;
    font-family: 'Poppins', sans-serif; position: relative;
  }
  .nav-cart-btn .nc-count {
    background: var(--red); color: #fff; font-size: .65rem; font-weight: 700;
    border-radius: 50%; width: 17px; height: 17px; display: flex; align-items: center; justify-content: center;
  }
  @media (max-width: 600px) { .nav-links a:not(.nav-cart-link) { display: none; } }

  .open-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(50,140,70,.15); border: 1px solid rgba(50,200,80,.3);
    border-radius: 40px; padding: 6px 18px; font-size: .78rem; color: #5de08a;
    margin-bottom: 28px; animation: fade-down .9s .35s ease both;
  }
  .open-dot { width: 8px; height: 8px; border-radius: 50%; background: #5de08a; animation: blink 1.6s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── CHECKOUT PAGE ── */
  #checkoutOverlay {
    position: fixed; inset: 0; background: var(--dark);
    z-index: 1500; overflow-y: auto;
    transform: translateX(100%); transition: transform .4s cubic-bezier(.4,0,.2,1);
  }
  #checkoutOverlay.show { transform: translateX(0); }

  .checkout-page { max-width: 560px; margin: 0 auto; padding: 90px 24px 60px; }

  .checkout-crumbs { font-size: .8rem; color: rgba(255,255,255,.4); margin-bottom: 24px; display: flex; align-items: center; gap: 8px; }
  .checkout-crumbs span.current { color: var(--gold); font-weight: 600; }
  .checkout-back { background: none; border: none; color: var(--gold); font-size: .85rem; cursor: pointer; display: flex; align-items: center; gap: 6px; margin-bottom: 18px; padding: 0; }

  .checkout-section {
    background: linear-gradient(145deg, var(--panel), var(--panel2));
    border: 1px solid rgba(201,168,76,.12);
    border-radius: 18px; padding: 26px 24px; margin-bottom: 20px;
  }

  .checkout-label { font-size: .82rem; color: rgba(255,255,255,.7); font-weight: 600; margin-bottom: 8px; display: block; }
  .checkout-input {
    width: 100%; padding: 13px 16px; border-radius: 12px; margin-bottom: 20px;
    background: rgba(255,255,255,.04); border: 1.5px solid rgba(255,255,255,.12);
    color: var(--cream); font-size: .9rem; font-family: 'Poppins', sans-serif;
  }
  .checkout-input:focus { outline: none; border-color: var(--gold); }
  .checkout-input::placeholder { color: rgba(255,255,255,.3); }
  .checkout-input:last-child { margin-bottom: 0; }

  .phone-input-row { display: flex; gap: 8px; margin-bottom: 20px; }
  .phone-prefix {
    padding: 13px 14px; border-radius: 12px; background: rgba(255,255,255,.04);
    border: 1.5px solid rgba(255,255,255,.12); color: var(--cream); font-size: .9rem; flex-shrink: 0;
  }
  .phone-input-row .checkout-input { margin-bottom: 0; flex-grow: 1; }

  .order-type-toggle { display: flex; gap: 10px; margin-bottom: 4px; }
  .order-type-toggle button {
    flex: 1; padding: 12px 0; border-radius: 12px; border: 1.5px solid rgba(201,168,76,.3);
    background: transparent; color: rgba(255,255,255,.6); font-weight: 600; font-size: .85rem;
    cursor: pointer; transition: all .2s; font-family: 'Poppins', sans-serif;
  }
  .order-type-toggle button.active { background: var(--gold); color: var(--dark); border-color: var(--gold); }

  .checkout-textarea {
    width: 100%; min-height: 90px; padding: 13px 16px; border-radius: 12px;
    background: rgba(255,255,255,.04); border: 1.5px solid rgba(255,255,255,.12);
    color: var(--cream); font-size: .88rem; font-family: 'Poppins', sans-serif; resize: vertical;
  }
  .checkout-textarea:focus { outline: none; border-color: var(--gold); }
  .checkout-textarea::placeholder { color: rgba(255,255,255,.3); }

  .payment-option {
    display: flex; align-items: center; gap: 12px; padding: 16px;
    border: 1.5px solid var(--gold);
